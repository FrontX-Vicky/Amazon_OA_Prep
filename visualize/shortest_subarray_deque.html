<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monotonic Deque Visualizer</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --accent-color: #3b82f6;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --card-bg: #1e293b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { margin-bottom: 0.5rem; }
        .subtitle { color: #94a3b8; margin-bottom: 2rem; }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 900px;
        }

        .vars-container {
            display: flex;
            justify-content: space-around;
            margin-bottom: 2rem;
            font-size: 1.2rem;
        }

        .var-box {
            background-color: #334155;
            padding: 1rem 2rem;
            border-radius: 8px;
            text-align: center;
        }
        
        .var-value {
            font-weight: bold;
            color: var(--success-color);
            font-size: 1.5rem;
        }

        .array-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .array-box {
            width: 60px;
            height: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #334155;
            border: 2px solid #475569;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            position: relative;
            transition: all 0.3s ease;
        }
        
        .array-box.active {
            border-color: var(--accent-color);
            box-shadow: 0 0 10px var(--accent-color);
        }

        .array-box .index {
            font-size: 0.7rem;
            color: #94a3b8;
            position: absolute;
            bottom: 2px;
        }

        .deque-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 2rem;
            min-height: 80px;
            padding: 1rem;
            border: 2px dashed #475569;
            border-radius: 8px;
            position: relative;
        }
        
        .deque-label {
            position: absolute;
            top: -12px;
            background: var(--card-bg);
            padding: 0 10px;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .deque-item {
            padding: 0.5rem 1rem;
            background-color: #6366f1;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-weight: bold;
        }
        
        .deque-item.popped {
            background-color: var(--danger-color);
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.5s ease;
        }
        
        .deque-item.matched {
            background-color: var(--success-color);
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 2rem;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            background-color: var(--accent-color);
            color: white;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        button:hover { background-color: #2563eb; }
        button:disabled { background-color: #475569; cursor: not-allowed; }

        .log-container {
            margin-top: 2rem;
            background-color: #0f172a;
            padding: 1rem;
            border-radius: 8px;
            height: 150px;
            overflow-y: auto;
            font-family: monospace;
            border: 1px solid #334155;
        }
        
        .log-entry { margin-bottom: 0.5rem; }
        .log-info { color: #94a3b8; }
        .log-success { color: var(--success-color); }
        .log-danger { color: var(--danger-color); }
        .log-highlight { color: #fbbf24; }
    </style>
</head>
<body>

    <h1>Monotonic Deque (Shortest Subarray)</h1>
    <div class="subtitle">Finding shortest subarray with sum >= K when array contains negative numbers</div>

    <div class="container">
        <div class="vars-container">
            <div class="var-box">
                <div>Target (K)</div>
                <div class="var-value">3</div>
            </div>
            <div class="var-box">
                <div>Shortest Subarray</div>
                <div class="var-value" id="shortest-val">∞</div>
            </div>
        </div>

        <h3>Original Array (nums)</h3>
        <div class="array-container" id="nums-container">
            <!-- Populated by JS -->
        </div>

        <h3>Prefix Sum Array (prefix_sum)</h3>
        <div class="array-container" id="prefix-container">
            <!-- Populated by JS -->
        </div>

        <div class="deque-container" id="deque-container">
            <div class="deque-label">Monotonic Deque (Stores Indices)</div>
            <!-- Populated by JS -->
        </div>

        <div class="log-container" id="log"></div>

        <div class="controls">
            <button id="prev-btn" disabled>Previous Step</button>
            <button id="next-btn">Next Step</button>
            <button id="reset-btn">Reset</button>
        </div>
    </div>

    <script>
        // Problem Data
        const nums = [2, -1, 2];
        const k = 3;
        const prefixSum = [0, 2, 1, 3];
        
        // UI Elements
        const numsContainer = document.getElementById('nums-container');
        const prefixContainer = document.getElementById('prefix-container');
        const dequeContainer = document.getElementById('deque-container');
        const logContainer = document.getElementById('log');
        const shortestVal = document.getElementById('shortest-val');
        
        // Buttons
        const nextBtn = document.getElementById('next-btn');
        const prevBtn = document.getElementById('prev-btn');
        const resetBtn = document.getElementById('reset-btn');

        // State Machine
        let states = [];
        let currentStateIdx = -1;

        // Initialize UI Arrays
        function initArrays() {
            numsContainer.innerHTML = '';
            nums.forEach((val, i) => {
                numsContainer.innerHTML += `<div class="array-box" id="nums-${i}">
                    ${val}
                    <span class="index">i=${i}</span>
                </div>`;
            });

            prefixContainer.innerHTML = '';
            prefixSum.forEach((val, i) => {
                prefixContainer.innerHTML += `<div class="array-box" id="prefix-${i}">
                    ${val}
                    <span class="index">idx=${i}</span>
                </div>`;
            });
        }

        // Generate States for the visualizer
        function generateStates() {
            states = [];
            let q = [];
            let shortest = Infinity;
            
            states.push({
                i: -1,
                q: [...q],
                shortest: shortest,
                log: `<span class="log-info">Initialized prefix sum array. Starting Monotonic Deque logic.</span>`
            });

            for (let i = 0; i < prefixSum.length; i++) {
                states.push({
                    i: i,
                    q: [...q],
                    shortest: shortest,
                    log: `<span class="log-highlight">--- Processing index ${i} (prefix_sum[${i}] = ${prefixSum[i]}) ---</span>`
                });

                // Step A: Check for valid subarray
                states.push({
                    i: i,
                    q: [...q],
                    shortest: shortest,
                    log: `<span class="log-info">Loop A: Check if prefix_sum[${i}] - prefix_sum[q[0]] >= ${k}</span>`
                });

                while (q.length > 0 && prefixSum[i] - prefixSum[q[0]] >= k) {
                    let poppedIdx = q[0]; // peek front
                    let diff = prefixSum[i] - prefixSum[poppedIdx];
                    let dist = i - poppedIdx;
                    
                    states.push({
                        i: i,
                        q: [...q],
                        shortest: shortest,
                        matchedFront: true,
                        log: `<span class="log-success">SUCCESS! ${prefixSum[i]} - ${prefixSum[poppedIdx]} = ${diff} (>= ${k}). Found valid subarray of length ${dist}.</span>`
                    });
                    
                    if (dist < shortest) {
                        shortest = dist;
                    }
                    
                    q.shift(); // popleft
                    
                    states.push({
                        i: i,
                        q: [...q],
                        shortest: shortest,
                        poppedFront: poppedIdx,
                        log: `<span class="log-info">Popped front index ${poppedIdx} because we want shortest array. We never need it again.</span>`
                    });
                }
                
                if (q.length > 0 && prefixSum[i] - prefixSum[q[0]] < k) {
                    states.push({
                        i: i,
                        q: [...q],
                        shortest: shortest,
                        log: `<span class="log-info">Condition not met: ${prefixSum[i]} - ${prefixSum[q[0]]} < ${k}. Move to Step B.</span>`
                    });
                }

                // Step B: Maintain Monotonic Property
                states.push({
                    i: i,
                    q: [...q],
                    shortest: shortest,
                    log: `<span class="log-info">Loop B: Maintain strictly increasing order. Check if prefix_sum[${i}] <= prefix_sum[q[-1]]</span>`
                });

                while (q.length > 0 && prefixSum[i] <= prefixSum[q[q.length - 1]]) {
                    let backIdx = q[q.length - 1];
                    states.push({
                        i: i,
                        q: [...q],
                        shortest: shortest,
                        log: `<span class="log-danger">WARNING: prefix_sum[${i}] (${prefixSum[i]}) <= prefix_sum[${backIdx}] (${prefixSum[backIdx]}). Index ${backIdx} is useless now!</span>`
                    });
                    
                    q.pop();
                    
                    states.push({
                        i: i,
                        q: [...q],
                        shortest: shortest,
                        poppedBack: backIdx,
                        log: `<span class="log-info">Popped back index ${backIdx}. Current index ${i} dominates it.</span>`
                    });
                }
                
                if (q.length === 0 || prefixSum[i] > prefixSum[q[q.length - 1]]) {
                     states.push({
                        i: i,
                        q: [...q],
                        shortest: shortest,
                        log: `<span class="log-info">Queue is strictly increasing. Proceeding to add current index.</span>`
                    });
                }

                // Step C: Add current index
                q.push(i);
                states.push({
                    i: i,
                    q: [...q],
                    shortest: shortest,
                    log: `<span class="log-success">Step C: Appended current index ${i} to Deque.</span>`
                });
            }
            
            states.push({
                i: -1,
                q: [...q],
                shortest: shortest,
                log: `<span class="log-highlight">Algorithm Complete! Shortest subarray length is ${shortest === Infinity ? -1 : shortest}.</span>`
            });
        }

        function renderState(stateIdx) {
            const state = states[stateIdx];
            
            // Update shortest val
            shortestVal.innerText = state.shortest === Infinity ? '∞' : state.shortest;

            // Highlight active array element
            document.querySelectorAll('.array-box').forEach(el => el.classList.remove('active'));
            if (state.i >= 0) {
                const activeEl = document.getElementById(`prefix-${state.i}`);
                if (activeEl) activeEl.classList.add('active');
            }

            // Render Deque
            dequeContainer.innerHTML = '<div class="deque-label">Monotonic Deque (Stores Indices)</div>';
            state.q.forEach(idx => {
                let extraClass = '';
                if (state.matchedFront && idx === state.q[0]) extraClass = 'matched';
                
                dequeContainer.innerHTML += `
                    <div class="deque-item ${extraClass}">
                        <span>idx: ${idx}</span>
                        <span style="font-size:0.8rem; font-weight:normal">val: ${prefixSum[idx]}</span>
                    </div>
                `;
            });
            
            // Render Popped items for animation effect
            if (state.poppedFront !== undefined) {
                 dequeContainer.innerHTML = `
                    <div class="deque-item popped">
                        <span>idx: ${state.poppedFront}</span>
                        <span style="font-size:0.8rem; font-weight:normal">val: ${prefixSum[state.poppedFront]}</span>
                    </div>
                ` + dequeContainer.innerHTML;
            }
            if (state.poppedBack !== undefined) {
                 dequeContainer.innerHTML += `
                    <div class="deque-item popped">
                        <span>idx: ${state.poppedBack}</span>
                        <span style="font-size:0.8rem; font-weight:normal">val: ${prefixSum[state.poppedBack]}</span>
                    </div>
                `;
            }

            // Update Log
            logContainer.innerHTML += `<div class="log-entry">${state.log}</div>`;
            logContainer.scrollTop = logContainer.scrollHeight;

            // Update Buttons
            prevBtn.disabled = stateIdx === 0;
            nextBtn.disabled = stateIdx === states.length - 1;
        }

        // Event Listeners
        nextBtn.addEventListener('click', () => {
            if (currentStateIdx < states.length - 1) {
                currentStateIdx++;
                renderState(currentStateIdx);
            }
        });

        prevBtn.addEventListener('click', () => {
            if (currentStateIdx > 0) {
                // Clear log when going backwards to prevent clutter
                logContainer.innerHTML = '';
                currentStateIdx--;
                // Re-render all previous logs
                for(let i=0; i<=currentStateIdx; i++){
                    if(i===currentStateIdx) renderState(i); // Only render full UI on the last one
                    else logContainer.innerHTML += `<div class="log-entry">${states[i].log}</div>`;
                }
            }
        });

        resetBtn.addEventListener('click', () => {
            logContainer.innerHTML = '';
            currentStateIdx = 0;
            renderState(currentStateIdx);
        });

        // Initialize
        initArrays();
        generateStates();
        currentStateIdx = 0;
        renderState(currentStateIdx);

    </script>
</body>
</html>
